<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DARAZ — Modern Store</title>
  <meta name="description" content="Shop the latest fashion collections at DARAZ." />
  <link rel="stylesheet" href="CSS/base.css" />
  <link rel="stylesheet" href="CSS/index.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo">DARAZ</a>
    <div class="nav-search">
      <span class="nav-search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg></span>
      <input type="text" id="nav-search-input" placeholder="Search products…" autocomplete="off" />
      <div class="search-dropdown" id="search-dropdown"></div>
    </div>
    <div class="nav-links">
      <a href="index.html" class="active">Shop</a>
      <a href="cart.html">Cart <span class="cart-count" id="nav-cart-count">0</span></a>
      <a href="orders.html">My Orders</a>
      <a href="admin.html">Admin</a>
      <a href="login.html" id="nav-auth-btn">Login</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <p class="hero-sub">Authentic Nepali Collection 2026</p>
      <h1>Crafted<br><em>in the</em><br>Himalayas.</h1>
      <a href="#products" class="btn-primary">Shop Now</a>
    </div>
    <div class="hero-visual">
      <div class="hero-circle"></div>
      <div class="hero-badge">🏔️ FREE SHIPPING OVER ₹999</div>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section class="products-section" id="products">
    <div class="section-header">
      <h2>Featured Products</h2>
      <div class="filter-bar">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="men">Men</button>
        <button class="filter-btn" data-cat="women">Women</button>
        <button class="filter-btn" data-cat="accessories">Accessories</button>
      </div>
    </div>
    <div class="products-grid" id="products-grid"></div>
  </section>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <footer class="footer">
    <p>© 2026 DARAZ. All rights reserved.</p>
    <p>Built By Sushil Pant</p>
  </footer>

  <script src="script/backend.js"></script>
  <script src="script/main.js"></script>
</body>

</html>
