<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — DARAZ</title>
  <link rel="stylesheet" href="CSS/base.css" />
  <link rel="stylesheet" href="CSS/admin.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet" />
</head>

<body>

  <nav class="navbar">
    <a href="index.html" class="logo">DARAZ</a>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-count" id="nav-cart-count">0</span></a>
      <a href="admin.html" class="active">Admin</a>
    </div>
  </nav>

  <section class="page-section">
    <h2 class="page-title">Admin Panel</h2>

    <div class="admin-layout">
      <!-- ADD PRODUCT FORM -->
      <div class="admin-form-card">
        <h3>Add / Edit Product</h3>
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="prod-name" placeholder="e.g. Oversized Tee" />
        </div>
        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" id="prod-price" placeholder="999" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="prod-cat">
            <option value="men">Men</option>
            <option value="women">Women</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="prod-img" placeholder="https://..." />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="prod-desc" rows="3" placeholder="Short description..."></textarea>
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" id="prod-stock" placeholder="50" />
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="saveProduct()">Save Product</button>
          <button class="btn-outline" onclick="resetForm()">Reset</button>
        </div>
      </div>

      <!-- STATS -->
      <div class="admin-stats">
        <div class="stat-card">
          <span class="stat-label">Total Products</span>
          <span class="stat-value" id="stat-products">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Orders</span>
          <span class="stat-value" id="stat-orders">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Revenue</span>
          <span class="stat-value" id="stat-revenue">₹0</span>
        </div>
      </div>
    </div>

    <!-- PRODUCT TABLE -->
    <div class="admin-table-wrap">
      <h3>Product List</h3>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="admin-table-body"></tbody>
      </table>
    </div>

    <!-- ORDERS TABLE -->
    <div class="admin-table-wrap" style="margin-top:2rem">
      <h3>Orders</h3>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Items</th>
            <th>Total</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="orders-table-body"></tbody>
      </table>
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script src="../Backend/backend.js"></script>
  <script src="script/admin.js"></script>
</body>

</html>
