<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — DARAZ</title>
  <link rel="stylesheet" href="CSS/base.css" />
  <link rel="stylesheet" href="CSS/checkout.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">DARAZ</a>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-count" id="nav-cart-count">0</span></a>
      <a href="orders.html">My Orders</a>
      <a href="login.html" id="nav-auth-btn">Login</a>
    </div>
  </nav>

  <section class="page-section">
    <h2 class="page-title">Checkout</h2>
    <div class="checkout-layout">

      <!-- ADDRESS FORM -->
      <div class="checkout-form-wrap">
        <div class="checkout-card">
          <h3 class="card-heading">📍 Delivery Address</h3>

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="addr-name" placeholder="John Doe" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="addr-phone" placeholder="+91 9876543210" />
          </div>
          <div class="form-group">
            <label>Address Line 1</label>
            <input type="text" id="addr-line1" placeholder="House No, Street Name" />
          </div>
          <div class="form-group">
            <label>Address Line 2 (Optional)</label>
            <input type="text" id="addr-line2" placeholder="Landmark, Area" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <input type="text" id="addr-city" placeholder="Mumbai" />
            </div>
            <div class="form-group">
              <label>State</label>
              <select id="addr-state">
                <option value="">Select State</option>
                <option>Andhra Pradesh</option><option>Arunachal Pradesh</option>
                <option>Assam</option><option>Bihar</option><option>Chhattisgarh</option>
                <option>Goa</option><option>Gujarat</option><option>Haryana</option>
                <option>Himachal Pradesh</option><option>Jharkhand</option>
                <option>Karnataka</option><option>Kerala</option>
                <option>Madhya Pradesh</option><option>Maharashtra</option>
                <option>Manipur</option><option>Meghalaya</option><option>Mizoram</option>
                <option>Nagaland</option><option>Odisha</option><option>Punjab</option>
                <option>Rajasthan</option><option>Sikkim</option><option>Tamil Nadu</option>
                <option>Telangana</option><option>Tripura</option>
                <option>Uttar Pradesh</option><option>Uttarakhand</option>
                <option>West Bengal</option><option>Delhi</option>
                <option>Jammu & Kashmir</option><option>Ladakh</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>PIN Code</label>
              <input type="text" id="addr-pin" placeholder="400001" maxlength="6" />
            </div>
            <div class="form-group">
              <label>Country</label>
              <input type="text" id="addr-country" value="India" readonly />
            </div>
          </div>

          <!-- USE MY LOCATION -->
          <button class="btn-location" id="btn-location" onclick="detectLocation()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
            Use My Current Location
          </button>
          <div id="location-status" class="location-status" style="display:none"></div>
        </div>

        <div class="checkout-card">
          <h3 class="card-heading">💳 Payment Method</h3>
          <div class="payment-options">
            <label class="payment-option">
              <input type="radio" name="payment" value="cod" checked />
              <div class="payment-label">
                <span class="payment-icon">💵</span>
                <div><strong>Cash on Delivery</strong><small>Pay when your order arrives</small></div>
              </div>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="upi" />
              <div class="payment-label">
                <span class="payment-icon">📱</span>
                <div><strong>UPI / PhonePe / GPay</strong><small>Instant payment via UPI</small></div>
              </div>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="card" />
              <div class="payment-label">
                <span class="payment-icon">💳</span>
                <div><strong>Debit / Credit Card</strong><small>Visa, Mastercard, Rupay</small></div>
              </div>
            </label>
          </div>
        </div>
      </div>

      <!-- ORDER SUMMARY -->
      <div class="checkout-summary-wrap">
        <div class="checkout-card sticky-card">
          <h3 class="card-heading">🧾 Order Summary</h3>
          <div id="checkout-items" class="checkout-items"></div>
          <div class="summary-divider"></div>
          <div class="summary-row"><span>Subtotal</span><span id="co-subtotal">₹0</span></div>
          <div class="summary-row"><span>Shipping</span><span id="co-shipping">₹0</span></div>
          <div class="summary-row total-row"><span>Total</span><span id="co-total">₹0</span></div>
          <button class="btn-primary wide" id="place-order-btn" onclick="placeOrder()">Place Order →</button>
          <a href="cart.html" class="continue-link">← Back to Cart</a>
        </div>
      </div>

    </div>
  </section>

  <div class="toast" id="toast"></div>
  <footer class="footer">
    <p>© 2026 DARAZ. All rights reserved.</p>
    <p>Built with ❤ — HTML, CSS &amp; JavaScript</p>
  </footer>
  <script src="script/backend.js"></script>
  <script src="script/checkout.js"></script>
</body>
</html>
